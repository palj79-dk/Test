name: Build Android APK

# Builds an installable (sideloadable) debug APK of the latest fallengrid-v*.html.
# Runs on every push that touches the game or the wrapper, and can be run on demand.
on:
  push:
    branches: [ "claude/tower-defense-graphics-l7p9mn" ]
    paths:
      - "app/**"
      - "fallengrid-v*.html"
      - ".github/workflows/android.yml"
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Capacitor
        run: npm install

      - name: Bundle the latest game build as index.html
        run: |
          latest=$(ls -1 ../fallengrid-v*.html | sort -V | tail -1)
          echo "Bundling $latest"
          mkdir -p www
          cp "$latest" www/index.html

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Use the committed stable debug keystore
        run: |
          mkdir -p ~/.android
          cp keystore/debug.keystore ~/.android/debug.keystore

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Name the APK with the game version
        run: |
          ver=$(ls -1 ../fallengrid-v*.html | sort -V | tail -1 | sed -E 's#.*/fallengrid-(v[0-9.]+)\.html#\1#')
          cp android/app/build/outputs/apk/debug/app-debug.apk "fallengrid-${ver}.apk"
          echo "Built fallengrid-${ver}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fallengrid-apk
          path: app/fallengrid-*.apk
          if-no-files-found: error
