<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0e1214" />
<title>FALLEN GRID — Wasteland Defense</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05070a;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    touch-action: none; user-select: none; -webkit-user-select: none; }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #game { display: block; touch-action: none; }
  #overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(6,9,12,0.82); backdrop-filter: blur(4px); z-index: 10; padding: 20px; }
  .panel { position: relative; width: min(336px, 90vw); text-align: center; color: #e8eef0;
    background: linear-gradient(165deg, #1a2228 0%, #10161a 100%);
    border: 1px solid #2c3a42; border-radius: 4px; padding: 26px 24px;
    box-shadow: 0 24px 70px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px)); }
  .panel::before { content: ""; position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
    border: 1px solid rgba(55,224,208,0.14); pointer-events: none;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px)); }
  .panel h1 { font-size: 34px; letter-spacing: 5px; font-weight: 900; color: #37e0d0;
    text-shadow: 0 0 18px rgba(55,224,208,0.5); margin-bottom: 2px; }
  .panel h2 { font-size: 22px; letter-spacing: 2px; color: #37e0d0; margin-bottom: 8px;
    text-shadow: 0 0 14px rgba(55,224,208,0.4); }
  .panel .sub { color: #8a969c; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 18px; }
  .panel .tag { color: #b6c0c4; font-size: 13px; line-height: 1.5; margin-bottom: 20px; }
  .panel .best { color: #6f7c82; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-top: 14px; }
  .crest { font-size: 40px; margin-bottom: 6px; filter: drop-shadow(0 0 12px rgba(55,224,208,0.5)); }
  .btn { display: block; width: 100%; padding: 14px 16px; margin: 9px 0; cursor: pointer;
    border: 1px solid #2c3a42; border-radius: 3px; font-size: 14px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; background: #1c262c; color: #e8eef0; transition: transform .05s, background .15s; }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: linear-gradient(180deg, #37e0d0, #1fa89a); color: #06181a; border-color: #1fa89a;
    text-shadow: none; box-shadow: 0 0 20px rgba(55,224,208,0.3); }
  .btn.primary:active { background: linear-gradient(180deg, #2fc7b8, #178f82); }
  .btn.ghost { background: transparent; }
  .btn.small { padding: 10px; font-size: 12px; }
  .btn.active { background: linear-gradient(180deg, #37e0d0, #1fa89a); color: #06181a; border-color: #1fa89a; }
  .row { display: flex; gap: 8px; }
  .row .btn { flex: 1; }
  ul.how { text-align: left; font-size: 12.5px; line-height: 1.7; color: #b6c0c4; padding-left: 18px; margin-bottom: 20px; }
  ul.how b { color: #37e0d0; font-weight: 700; }
</style>
</head>
<body>
  <div id="stage"><canvas id="game"></canvas><div id="overlay"></div></div>
<script>
(function () {
  "use strict";

  /* ============================================================
     FALLEN GRID — Wasteland Defense
     Post-apocalyptic sci-fi tower defense. Standalone HTML.
     World/screen separation, camera zoom+pan, pre-rendered terrain.
     ============================================================ */

  const clamp = (v, a, b) => (v < a ? a : v > b ? b : v);
  const lerp = (a, b, t) => a + (b - a) * t;
  /* color helpers: return rgb()/rgba() strings so the hex-scan stays clean */
  function _hx(h) { h = h.replace("#", ""); if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2]; return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)]; }
  function mix(a, b, t) { const A = _hx(a), B = Array.isArray(b) ? b : _hx(b); return "rgb(" + Math.round(lerp(A[0], B[0], t)) + "," + Math.round(lerp(A[1], B[1], t)) + "," + Math.round(lerp(A[2], B[2], t)) + ")"; }
  const lighten = (c, t) => mix(c, [255, 255, 255], t);
  const darken = (c, t) => mix(c, [0, 0, 0], t);
  function rgba(hex, a) { const c = _hx(hex); return "rgba(" + c[0] + "," + c[1] + "," + c[2] + "," + a + ")"; }

  /* ---------------- STORAGE ---------------- */
  const Mem = {};
  const Store = {
    get(k, d) { try { const v = localStorage.getItem(k); return v === null ? d : JSON.parse(v); } catch (e) { return k in Mem ? Mem[k] : d; } },
    set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { Mem[k] = v; } },
  };

  /* ---------------- SCREEN LAYOUT (fixed, device-independent logical space) ---------------- */
  const W = 360, H = 640;
  const HUD_H = 56;
  const TRAY_H = 118;
  const PLAY_TOP = HUD_H;
  const PLAY_BOTTOM = H - TRAY_H;   // 522
  const PLAY_H = PLAY_BOTTOM - PLAY_TOP; // 466

  /* ---------------- WORLD (map space) ---------------- */
  const TILE = 64, COLS = 11, ROWS = 16;
  const WORLD_W = COLS * TILE; // 704
  const WORLD_H = ROWS * TILE; // 1024

  /* ---------------- PALETTE ---------------- */
  const C = {
    skyTop: "#20191a", skyBot: "#12171a",
    ash1: "#48443d", ash2: "#403c36", ashEdge: "#2f2c27",
    road: "#2c2c30", roadDark: "#242428", roadCrack: "#3c3c42", roadLine: "#9a7a2a",
    rubble: "#645f56",
    toxic: "#74d63a", toxicDark: "#3c7420",
    rust: "#8a5636", rustDark: "#57351f",
    concrete: "#78746c",
    neonC: "#37e0d0", neonM: "#e0479a", neonA: "#f2b23a", neonG: "#8fe04a",
    hud: "#111619", hudEdge: "#28323a",
    scrap: "#f2b23a", scrapDark: "#a8781c",
    core: "#37e0d0",
    text: "#e8eef0", textDim: "#8a969c",
    tray: "#0f1418", trayCell: "#1a2228", trayCellHi: "#25303a",
    danger: "#e0533f",
    hpGood: "#6fe04a", hpMid: "#f2b23a", hpLow: "#e0533f",
    range: "rgba(55,224,208,0.10)", rangeEdge: "rgba(55,224,208,0.55)",
  };

  /* ---------------- TOWERS ---------------- */
  // dmgType drives the counterplay triangle: kinetic weak vs armor, explosive strong vs armor, energy strips shields.
  // Each tower shares L1/L2, then the L2->L3 upgrade branches into a/b specializations (a real choice).
  const TOWERS = {
    turret: { name: "Auto-Gun", short: "AUTO-GUN", kind: "hit", dmgType: "kinetic", metal: "#5a6068", metalLt: "#79808a", accent: "#f2b23a", desc: "kinetic",
      levels: [ { cost: 50, dmg: 9, range: 152, rate: 500 }, { cost: 45, dmg: 15, range: 168, rate: 440 }, { cost: 70, dmg: 25, range: 188, rate: 380 } ],
      branches: {
        a: { name: "Gatling", short: "GATLING", desc: "shreds swarms", cost: 75, dmg: 16, range: 190, rate: 175 },
        b: { name: "Breacher", short: "BREACHER", desc: "armor-piercing", cost: 85, dmg: 44, range: 205, rate: 500, pierce: true },
      } },
    cryo:   { name: "Cryo Emitter", short: "CRYO", kind: "orb", dmgType: "energy", metal: "#3a5460", metalLt: "#557886", accent: "#37e0d0", desc: "slows a cluster",
      levels: [ { cost: 65, dmg: 4, range: 136, rate: 720, splash: 60, slow: 0.45 }, { cost: 55, dmg: 7, range: 150, rate: 660, splash: 68, slow: 0.55 }, { cost: 80, dmg: 10, range: 164, rate: 600, splash: 78, slow: 0.68 } ],
      branches: {
        a: { name: "Glacier", short: "GLACIER", desc: "near-freeze AoE", cost: 80, dmg: 9, range: 172, rate: 560, splash: 96, slow: 0.84 },
        b: { name: "Shatter", short: "SHATTER", desc: "crushes slowed foes", cost: 95, dmg: 26, range: 166, rate: 640, splash: 82, slow: 0.4, shatter: true },
      } },
    mortar: { name: "Mortar", short: "MORTAR", kind: "lob", dmgType: "explosive", metal: "#6b4a34", metalLt: "#8a6446", accent: "#f28a3a", desc: "splash damage",
      levels: [ { cost: 85, dmg: 26, range: 150, rate: 1150, splash: 78 }, { cost: 70, dmg: 42, range: 162, rate: 1040, splash: 88 }, { cost: 110, dmg: 64, range: 178, rate: 920, splash: 100 } ],
      branches: {
        a: { name: "Carpet", short: "CARPET", desc: "wide barrage", cost: 105, dmg: 56, range: 188, rate: 820, splash: 126 },
        b: { name: "Buster", short: "BUSTER", desc: "anti-armor shell", cost: 135, dmg: 158, range: 182, rate: 1250, splash: 70, pierce: true },
      } },
    tesla:  { name: "Rail-Tesla", short: "TESLA", kind: "beam", dmgType: "energy", metal: "#4a3a5e", metalLt: "#6a557f", accent: "#e0479a", desc: "long-range nuke",
      levels: [ { cost: 95, dmg: 46, range: 268, rate: 1180 }, { cost: 85, dmg: 74, range: 290, rate: 1080 }, { cost: 130, dmg: 112, range: 318, rate: 940 } ],
      branches: {
        a: { name: "Arc-Coil", short: "ARC-COIL", desc: "chains + hits air", cost: 115, dmg: 66, range: 300, rate: 820, chain: 3 },
        b: { name: "Railgun", short: "RAILGUN", desc: "sniper nuke", cost: 155, dmg: 230, range: 362, rate: 1300 },
      } },
  };
  const TOWER_ORDER = ["turret", "cryo", "mortar", "tesla"];
  const SELL_REFUND = 0.7;
  const TARGET_MODES = ["first", "strong", "close"];
  const TARGET_LABEL = { first: "FIRST", strong: "STRONGEST", close: "CLOSEST" };
  const canHitAir = (kind) => kind === "hit" || kind === "beam"; // direct-fire towers can hit flyers; ground splash cannot

  /* ---------------- ENEMIES ---------------- */
  // traits: armor (kinetic-resistant), flying (only direct-fire towers hit), shield (regenerating pool, stripped fast by energy)
  const ENEMIES = {
    stalker:    { hp: 16, speed: 148, reward: 4, r: 15, body: "#6f9a3a", dark: "#3f5f20", eye: "#e0533f", shape: "stalker" },
    raider:     { hp: 34, speed: 90, reward: 5, r: 18, body: "#9a7a4a", dark: "#5f4a2a", eye: "#37e0d0", shape: "raider" },
    brute:      { hp: 105, speed: 54, reward: 10, r: 24, body: "#b0503a", dark: "#6f2f20", eye: "#f2b23a", shape: "brute" },
    sentinel:   { hp: 92, speed: 60, reward: 13, r: 23, body: "#697079", dark: "#33383f", eye: "#f2b23a", shape: "brute", armor: true },
    wraith:     { hp: 38, speed: 122, reward: 8, r: 16, body: "#7d61a2", dark: "#3d2c5c", eye: "#cfa8ff", shape: "wraith", flying: true },
    warden:     { hp: 66, speed: 72, reward: 12, r: 20, body: "#3a6a68", dark: "#1f3d3c", eye: "#37e0d0", shape: "raider", shield: 60 },
    juggernaut: { hp: 1150, speed: 42, reward: 130, r: 34, body: "#4a4e56", dark: "#26292e", eye: "#e0479a", shape: "juggernaut", shield: 420 },
  };
  const ENEMY_LABEL = { stalker: "Stalker", raider: "Raider", brute: "Brute", sentinel: "Sentinel", wraith: "Wraith", warden: "Warden", juggernaut: "Juggernaut" };

  const START_SCRAP = 150, START_CORE = 20, TOTAL_WAVES = 20;
  const NEXT_WAVE_COUNTDOWN = 6;

  /* ---------------- HASH ---------------- */
  function hash2(a, b) { let h = (a * 374761393 + b * 668265263) | 0; h = (h ^ (h >>> 13)) * 1274126177; h ^= h >>> 16; return ((h >>> 0) % 10000) / 10000; }

  /* ---------------- PATH ---------------- */
  const WAYPOINTS = [
    [0, 1], [9, 1], [9, 4], [1, 4], [1, 7], [9, 7],
    [9, 10], [1, 10], [1, 13], [9, 13], [9, 15], [5, 15],
  ];
  function buildPath(wp) {
    const tiles = [], seen = new Set();
    const add = (c, r) => { const k = c + "," + r; if (!seen.has(k)) { seen.add(k); tiles.push([c, r]); } };
    for (let i = 0; i < wp.length - 1; i++) {
      let [c0, r0] = wp[i]; const [c1, r1] = wp[i + 1]; add(c0, r0);
      if (c0 === c1) { const s = r1 > r0 ? 1 : -1; while (r0 !== r1) { r0 += s; add(c0, r0); } }
      else { const s = c1 > c0 ? 1 : -1; while (c0 !== c1) { c0 += s; add(c0, r0); } }
    }
    return tiles;
  }
  const PATH_TILES = buildPath(WAYPOINTS);
  const PATH_SET = new Set(PATH_TILES.map(([c, r]) => c + "," + r));
  const center = (c, r) => ({ x: c * TILE + TILE / 2, y: r * TILE + TILE / 2 });
  const PATH_PTS = PATH_TILES.map(([c, r]) => center(c, r));
  const buildable = (c, r) => c >= 0 && r >= 0 && c < COLS && r < ROWS && !PATH_SET.has(c + "," + r);

  /* ---------------- DECOR + POOLS ---------------- */
  const DECOR = [], POOLS = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (PATH_SET.has(c + "," + r)) continue;
    const h = hash2(c, r);
    if (h > 0.80) {
      let type;
      if (h > 0.965) type = "wreck";
      else if (h > 0.93) type = "pool";
      else if (h > 0.89) type = "barrel";
      else if (h > 0.855) type = "rubble";
      else type = "crater";
      DECOR.push({ c, r, type, seed: hash2(c * 3, r * 7) });
      if (type === "pool") { const p = center(c, r); POOLS.push({ x: p.x, y: p.y }); }
    }
  }

  /* ---------------- AUDIO ---------------- */
  const Sound = (function () {
    let ctx = null, on = Store.get("sfx", true);
    const ac = () => { if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { ctx = null; } } return ctx; };
    function tone(f, d, type, g, glide) {
      if (!on) return; const a = ac(); if (!a) return;
      try {
        const o = a.createOscillator(), gain = a.createGain();
        o.type = type || "sine"; o.frequency.setValueAtTime(f, a.currentTime);
        if (glide) o.frequency.exponentialRampToValueAtTime(glide, a.currentTime + d);
        gain.gain.setValueAtTime(g || 0.06, a.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + d);
        o.connect(gain); gain.connect(a.destination); o.start(); o.stop(a.currentTime + d);
      } catch (e) {}
    }
    return {
      gun: () => tone(240, 0.05, "square", 0.035, 150),
      tesla: () => { tone(880, 0.06, "sawtooth", 0.05, 200); tone(1200, 0.05, "square", 0.03, 400); },
      cryo: () => tone(520, 0.14, "sine", 0.05, 260),
      boom: () => tone(120, 0.2, "sawtooth", 0.07, 50),
      hit: () => tone(160, 0.04, "square", 0.025),
      place: () => tone(300, 0.1, "square", 0.06, 520),
      up: () => tone(400, 0.13, "sawtooth", 0.06, 760),
      sell: () => tone(360, 0.1, "sine", 0.05, 180),
      err: () => tone(110, 0.14, "square", 0.05, 80),
      leak: () => tone(180, 0.2, "sawtooth", 0.08, 50),
      wave: () => { tone(180, 0.16, "sawtooth", 0.07, 320); setTimeout(() => tone(320, 0.14, "square", 0.05, 420), 120); },
      win: () => [330, 440, 550, 740].forEach((f, i) => setTimeout(() => tone(f, 0.2, "sine", 0.08), i * 130)),
      lose: () => [300, 220, 150, 90].forEach((f, i) => setTimeout(() => tone(f, 0.24, "sawtooth", 0.09), i * 150)),
      toggle(v) { on = v; Store.set("sfx", v); }, isOn: () => on,
    };
  })();
  const vibrate = (ms) => { try { navigator.vibrate && navigator.vibrate(ms); } catch (e) {} };

  /* ---------------- WAVES ---------------- */
  function waveComp(n) {
    const list = [];
    if (n % 5 === 0) {
      const bosses = n === TOTAL_WAVES ? 2 : 1;
      for (let i = 0; i < bosses; i++) list.push({ type: "juggernaut", delay: i * 2600 });
      const extra = 4 + Math.floor(n / 3);
      for (let i = 0; i < extra; i++) { const t = i % 3 === 0 ? "wraith" : i % 3 === 1 ? "stalker" : "raider"; list.push({ type: t, delay: 2800 + i * 420 }); }
      return list;
    }
    const st = Math.max(2, 6 - Math.floor(n / 5)), rd = 3 + Math.floor(n / 2), br = n >= 4 ? Math.floor(n / 3) : 0;
    const wr = n >= 3 ? 1 + Math.floor(n / 4) : 0;      // wraiths (flyers) force anti-air
    const se = n >= 6 ? Math.floor((n - 3) / 3) : 0;     // sentinels (armored) force AP/explosive
    const wd = n >= 8 ? Math.floor((n - 5) / 4) : 0;     // wardens (shielded) reward energy
    const seq = [];
    for (let i = 0; i < st; i++) seq.push("stalker");
    for (let i = 0; i < rd; i++) seq.push("raider");
    for (let i = 0; i < br; i++) seq.push("brute");
    for (let i = 0; i < se; i++) seq.push("sentinel");
    for (let i = 0; i < wr; i++) seq.push("wraith");
    for (let i = 0; i < wd; i++) seq.push("warden");
    seq.sort(() => Math.random() - 0.4);
    const slow = { brute: 560, sentinel: 560, warden: 460 };
    let t = 0; for (const type of seq) { list.push({ type, delay: t }); t += slow[type] || 380; }
    return list;
  }
  function waveCounts(n) { const c = {}; for (const e of waveComp(n)) c[e.type] = (c[e.type] || 0) + 1; return c; }
  function statsFor(type, wave) {
    const b = ENEMIES[type], hpMul = 1 + 0.13 * (wave - 1), rwMul = 1 + 0.045 * (wave - 1);
    const sh = b.shield ? Math.round(b.shield * (1 + 0.1 * (wave - 1))) : 0;
    return { type, r: b.r, body: b.body, dark: b.dark, eye: b.eye, shape: b.shape,
      hp: Math.round(b.hp * hpMul), maxHp: Math.round(b.hp * hpMul), speed: b.speed, reward: Math.round(b.reward * rwMul),
      armor: !!b.armor, flying: !!b.flying, shield: sh, shieldMax: sh, shieldCd: 0 };
  }

  /* ---------------- ENTITIES / STATE ---------------- */
  let enemies = [], towers = [], projs = [], parts = [], floats = [], beams = [], booms = [], gibs = [], scorches = [], smoke = [];
  const shake = { t: 0, dur: 0, mag: 0 };
  const doShake = (m, d) => { shake.mag = m; shake.dur = d; shake.t = d; };
  function shakeOff() { if (shake.t <= 0) return { x: 0, y: 0 }; const p = shake.t / shake.dur, m = shake.mag * p; return { x: (Math.random() * 2 - 1) * m, y: (Math.random() * 2 - 1) * m }; }
  let screenFlash = 0;

  const cam = { x: 0, y: 0, zoom: 1 };
  const MINZOOM = Math.min(W / WORLD_W, PLAY_H / WORLD_H) * 0.98;
  const MAXZOOM = 1.9;

  const STRIKE_CD = 30, STRIKE_R = 92;
  const S = {
    screen: "menu", scrap: START_SCRAP, core: START_CORE, wave: 0, kills: 0,
    waveActive: false, queue: [], speed: 1, selTile: null, selTower: null,
    difficulty: Store.get("difficulty", "normal"), high: Store.get("high", 0),
    banner: { text: "", t: 0 }, countdown: 0, time: 0, sheetAnim: 1,
    strikeCd: 0, strikeArm: false, tut: -1,
  };
  const diffMul = () => (S.difficulty === "hard" ? 1.35 : 1);
  // onboarding: a chosen build plot to spotlight (buildable, just below the opening straight)
  const TUT_PLOT = { c: 3, r: 2 };

  function fitCamera() {
    cam.zoom = clamp(W / WORLD_W, MINZOOM, MAXZOOM);
    cam.x = (WORLD_W - W / cam.zoom) / 2;
    cam.y = 0;
    clampCam();
  }
  function clampCam() {
    const vw = W / cam.zoom, vh = PLAY_H / cam.zoom;
    cam.x = vw >= WORLD_W ? (WORLD_W - vw) / 2 : clamp(cam.x, 0, WORLD_W - vw);
    cam.y = vh >= WORLD_H ? (WORLD_H - vh) / 2 : clamp(cam.y, 0, WORLD_H - vh);
  }
  const screenToWorld = (sx, sy) => ({ x: sx / cam.zoom + cam.x, y: (sy - PLAY_TOP) / cam.zoom + cam.y });
  const worldToScreen = (wx, wy) => ({ x: (wx - cam.x) * cam.zoom, y: (wy - cam.y) * cam.zoom + PLAY_TOP });
  function zoomAt(sx, sy, factor) {
    const w = screenToWorld(sx, sy);
    cam.zoom = clamp(cam.zoom * factor, MINZOOM, MAXZOOM);
    cam.x = w.x - sx / cam.zoom;
    cam.y = w.y - (sy - PLAY_TOP) / cam.zoom;
    clampCam();
  }

  function reset() {
    enemies = []; towers = []; projs = []; parts = []; floats = []; beams = []; booms = []; gibs = []; scorches = []; smoke = [];
    S.scrap = START_SCRAP; S.core = START_CORE; S.wave = 0; S.kills = 0;
    S.waveActive = false; S.queue = []; S.selTile = null; S.selTower = null;
    S.countdown = 0; S.banner = { text: "", t: 0 }; screenFlash = 0;
    S.strikeCd = 0; S.strikeArm = false;
    S.tut = Store.get("tutDone", false) ? -1 : 0; // coach-marks on first play only
    fitCamera();
  }
  // active ability: orbital airstrike. explosive + armor-piercing, hits air and ground, brief stun.
  function doStrike(wx, wy) {
    const dmg = 130 * (1 + S.wave * 0.06);

        <li><b>Airstrike:</b> tap <b>✷</b>, then a target zone, for armor-piercing burst damage on a cooldown.</li>
        <li><b>Camera:</b> pinch to zoom, drag to pan, or use the on-screen controls.</li>
        <li>Waves auto-deploy after a countdown, or tap <b>Deploy</b> to send them early.</li>
        <li>Lose all <b>Core</b> integrity and the reactor falls.</li>
      </ul><button class="btn primary" id="b">Back</button></div>`);
      byId("b").onclick = () => { S.screen = "menu"; render(); };
    } else if (S.screen === "playing") hide();
    else if (S.screen === "paused") {
      show(`<div class="panel"><h2>Paused</h2><button class="btn primary" id="r">Resume</button><button class="btn" id="rs">Restart</button><button class="btn ghost" id="m">Abandon</button></div>`);
      byId("r").onclick = () => { S.screen = "playing"; render(); };
      byId("rs").onclick = () => { reset(); S.screen = "playing"; render(); };
      byId("m").onclick = () => { S.screen = "menu"; render(); };
    } else if (S.screen === "gameover") {
      show(`<div class="panel"><div class="crest">☢</div><h2>Reactor Lost</h2><p class="tag">Overrun at wave ${S.wave} of ${TOTAL_WAVES} · ${S.kills} hostiles neutralized</p><button class="btn primary" id="r">Redeploy</button><button class="btn ghost" id="m">Main Menu</button></div>`);
      byId("r").onclick = () => { reset(); S.screen = "playing"; render(); };
      byId("m").onclick = () => { S.screen = "menu"; render(); };
    } else if (S.screen === "victory") {
      show(`<div class="panel"><div class="crest">✦</div><h2>Grid Secured</h2><p class="tag">All ${TOTAL_WAVES} waves repelled · ${S.kills} hostiles neutralized</p><button class="btn primary" id="r">Play Again</button><button class="btn ghost" id="m">Main Menu</button></div>`);
      byId("r").onclick = () => { reset(); S.screen = "playing"; render(); };
      byId("m").onclick = () => { S.screen = "menu"; render(); };
    }
  }

  /* ---------------- INPUT (tap + pan + pinch) ---------------- */
  const DRAG_THRESH = 8;
  const ptrs = new Map();
  let gest = { mode: "none", downX: 0, downY: 0, moved: false, inPlay: false, prevX: 0, prevY: 0 };
  let pinch = { dist: 0, mx: 0, my: 0 };

  function evToScreen(ev) { const r = canvas.getBoundingClientRect(); return { x: (ev.clientX - r.left) * (W / r.width), y: (ev.clientY - r.top) * (H / r.height) }; }
  function pinchState() { const p = [...ptrs.values()]; const dx = p[1].x - p[0].x, dy = p[1].y - p[0].y; return { dist: Math.hypot(dx, dy), mx: (p[0].x + p[1].x) / 2, my: (p[0].y + p[1].y) / 2 }; }

  canvas.addEventListener("pointerdown", (ev) => {
    if (S.screen !== "playing") return;
    ev.preventDefault();
    const s = evToScreen(ev); ptrs.set(ev.pointerId, s);
    if (ptrs.size === 1) { gest.mode = "tap"; gest.downX = s.x; gest.downY = s.y; gest.prevX = s.x; gest.prevY = s.y; gest.moved = false; gest.inPlay = s.y >= PLAY_TOP && s.y < PLAY_BOTTOM; }
    else if (ptrs.size === 2) { gest.mode = "pinch"; const ps = pinchState(); pinch = ps; }
  });
  canvas.addEventListener("pointermove", (ev) => {
    if (S.screen !== "playing" || !ptrs.has(ev.pointerId)) return;
    const s = evToScreen(ev); ptrs.set(ev.pointerId, s);
    if (ptrs.size >= 2 && gest.mode === "pinch") {
      const ps = pinchState();
      if (pinch.dist > 0) { zoomAt(ps.mx, ps.my, ps.dist / pinch.dist); cam.x -= (ps.mx - pinch.mx) / cam.zoom; cam.y -= (ps.my - pinch.my) / cam.zoom; clampCam(); }
      pinch = ps;
    } else if (ptrs.size === 1 && (gest.mode === "tap" || gest.mode === "pan")) {
      const dx = s.x - gest.downX, dy = s.y - gest.downY;
      if (!gest.moved && Math.hypot(dx, dy) > DRAG_THRESH && gest.inPlay) { gest.mode = "pan"; gest.moved = true; }
      if (gest.mode === "pan") { cam.x -= (s.x - gest.prevX) / cam.zoom; cam.y -= (s.y - gest.prevY) / cam.zoom; clampCam(); }
      gest.prevX = s.x; gest.prevY = s.y;
    }
  });
  function endPtr(ev) {
    if (!ptrs.has(ev.pointerId)) return;
    const was = ptrs.size, s = ptrs.get(ev.pointerId); ptrs.delete(ev.pointerId);
    if (was === 1 && gest.mode === "tap" && !gest.moved) tap(gest.downX, gest.downY);
    if (ptrs.size === 1) { const rem = [...ptrs.values()][0]; gest.mode = "pan"; gest.moved = true; gest.prevX = rem.x; gest.prevY = rem.y; }
    else if (ptrs.size === 0) gest.mode = "none";
  }
  canvas.addEventListener("pointerup", (ev) => { if (S.screen === "playing") endPtr(ev); });
  canvas.addEventListener("pointercancel", (ev) => { if (S.screen === "playing") endPtr(ev); });

  const inBox = (x, y, b) => x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h;
  function tap(x, y) {
    if (tutSkipBtn && inBox(x, y, tutSkipBtn)) { tutFinish(); return; }
    for (const b of hudBtns) if (inBox(x, y, b)) { if (b.id === "speed") S.speed = S.speed === 1 ? 2 : S.speed === 2 ? 3 : 1; else if (b.id === "pause") { S.screen = "paused"; render(); } else if (b.id === "nextwave") startWave(); else if (b.id === "strike") { if (S.strikeArm) S.strikeArm = false; else if (S.strikeCd <= 0) { S.strikeArm = true; S.selTile = S.selTower = null; Sound.place(); } else Sound.err(); } return; }
    if (y < HUD_H) return;
    for (const b of zoomBtns) if (inBox(x, y, b)) { if (b.id === "in") zoomAt(W / 2, PLAY_TOP + PLAY_H / 2, 1.35); else if (b.id === "out") zoomAt(W / 2, PLAY_TOP + PLAY_H / 2, 1 / 1.35); else fitCamera(); return; }
    for (const b of abilityBtns) if (inBox(x, y, b)) { if (S.strikeArm) S.strikeArm = false; else if (S.strikeCd <= 0) { S.strikeArm = true; S.selTile = S.selTower = null; Sound.place(); } else Sound.err(); return; }
    // armed airstrike: a tap in the play viewport calls it down
    if (S.strikeArm) { if (y >= PLAY_TOP && y < PLAY_BOTTOM) { const w = screenToWorld(x, y); doStrike(w.x, w.y); } else S.strikeArm = false; return; }
    if (y >= PLAY_BOTTOM) { for (const b of trayBtns) if (inBox(x, y, b)) { trayAction(b); return; } return; }
    // world tap
    const w = screenToWorld(x, y), c = Math.floor(w.x / TILE), r = Math.floor(w.y / TILE);
    if (c < 0 || c >= COLS || r < 0 || r >= ROWS) { S.selTile = null; S.selTower = null; return; }
    const ex = towers.find((t) => t.c === c && t.r === r);
    if (ex) { S.selTile = null; S.selTower = towers.indexOf(ex); S.sheetAnim = 0; }
    else if (buildable(c, r)) { if (S.selTile && S.selTile.c === c && S.selTile.r === r) { S.selTile = null; } else { S.selTower = null; S.selTile = { c, r }; S.sheetAnim = 0; } }
    else { S.selTile = null; S.selTower = null; }
  }
  function trayAction(b) {
    if (b.action === "build") {
      if (!b.afford) { Sound.err(); vibrate(40); return; }
      const { c, r } = S.selTile, cost = TOWERS[b.tower].levels[0].cost; S.scrap -= cost;
      towers.push({ c, r, type: b.tower, lvl: 0, cd: 0, angle: -Math.PI / 2, recoil: 0, flash: 0, target: null, mode: "first" });
      S.selTile = null; Sound.place(); vibrate(18);
    } else if (b.action === "upgrade") {
      if (!b.afford) { Sound.err(); vibrate(40); return; }
      const t = towers[S.selTower], cost = TOWERS[t.type].levels[t.lvl + 1].cost; S.scrap -= cost; t.lvl++; Sound.up(); vibrate(18);
      const p = center(t.c, t.r); burst(p.x, p.y - 12, TOWERS[t.type].accent, 9);
    } else if (b.action === "branch") {
      if (!b.afford) { Sound.err(); vibrate(40); return; }
      const t = towers[S.selTower], br = TOWERS[t.type].branches[b.branch]; S.scrap -= br.cost; t.lvl = 2; t.branch = b.branch; Sound.up(); vibrate([12, 30]);
      const p = center(t.c, t.r); burst(p.x, p.y - 12, TOWERS[t.type].accent, 14); floats.push({ x: p.x, y: p.y - 22, text: br.short, life: 1, vy: -30, color: TOWERS[t.type].accent });
    } else if (b.action === "sell") {
      const t = towers[S.selTower];
      S.scrap += Math.round(towerSpent(t) * SELL_REFUND);
      towers.splice(S.selTower, 1); S.selTower = null; Sound.sell();
    } else if (b.action === "target") {
      const t = towers[S.selTower]; t.mode = TARGET_MODES[(TARGET_MODES.indexOf(t.mode) + 1) % TARGET_MODES.length]; Sound.place();
    }
  }

  /* ---------------- LOOP ---------------- */
  let last = performance.now();
  function frame(now) {
    let dtMs = now - last; last = now; dtMs = Math.min(dtMs, 50);
    const raw = dtMs / 1000; S.time += raw;
    if (screenFlash > 0) screenFlash = Math.max(0, screenFlash - raw * 2.2);

    if (S.screen === "playing") {
      const step = dtMs * S.speed, dt = step / 1000;
      updSpawns(step); updTowers(dt, step); updEnemies(dt); updProjs(dt); updParts(dt);
      if (shake.t > 0) shake.t -= raw;
      if (S.strikeCd > 0) S.strikeCd = Math.max(0, S.strikeCd - raw);
      if (!S.waveActive && S.wave < TOTAL_WAVES && S.countdown > 0) { S.countdown -= raw; if (S.countdown <= 0) { S.countdown = 0; startWave(); } }
      if (S.screen !== "playing") render();
    }

    // world layer (camera)
    const so = S.screen === "playing" ? shakeOff() : { x: 0, y: 0 };
    ctx.save();
    ctx.beginPath(); ctx.rect(0, PLAY_TOP, W, PLAY_H); ctx.clip();
    ctx.translate(so.x, so.y);
    ctx.translate(0, PLAY_TOP); ctx.scale(cam.zoom, cam.zoom); ctx.translate(-cam.x, -cam.y);
    if (terrain) ctx.drawImage(terrain, 0, 0, WORLD_W, WORLD_H);
    drawPoolGlow(); drawScorches(); drawSpawnAndBase(); drawSelRange(); drawTowers(); drawEnemies(); drawGibs(); drawBeams(); drawProjs(); drawBooms(); drawSmoke(); drawParts(); drawAtmosphere();
    ctx.restore();

    // screen layer
    drawScreenFlash(); drawLowCore();
    if (S.screen === "playing" && S.strikeArm) drawStrikeArm();
    drawBossBar();
    drawBanner(raw);
    drawZoomButtons();
    if (S.screen === "playing" || S.screen === "paused") drawAbility();
    drawHUD();
    drawTray(raw);
    drawTutorial();
    requestAnimationFrame(frame);
  }

  buildTerrain();
  fitCamera();
  render();
  requestAnimationFrame(frame);

  // debug hooks (no-op in normal play)
  window.__GAME = { S, cam, screenToWorld, startWave, tap, fitCamera, render,
    build(c, r, type) { if (!buildable(c, r) || towers.some((t) => t.c === c && t.r === r)) return false; towers.push({ c, r, type, lvl: 0, cd: 0, angle: -Math.PI / 2, recoil: 0, flash: 0, target: null, mode: "first" }); return true; },
    get enemies() { return enemies; }, get towers() { return towers; } };
})();
</script>
</body>
